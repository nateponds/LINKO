name: Deploy Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Sync Code to Hosting Path
        run: |
          mkdir -p /mnt/Storage2_New/website-hosting/linko-platform
          rsync -avz --delete --exclude '.git' --exclude 'node_modules' --exclude 'backend/node_modules' ./ /mnt/Storage2_New/website-hosting/linko-platform/

      - name: Deploy Production Services
        env:
          PROD_DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: |
          docker rm -f linko-backend-production linko-frontend-production || true
          cd /mnt/Storage2_New/website-hosting/linko-platform
          docker compose up -d --build linko-backend-production linko-frontend-production
