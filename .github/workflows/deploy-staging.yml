name: Deploy Staging

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Sync Code to Hosting Path
        run: |
          mkdir -p /mnt/Storage2_New/website-hosting/linko-platform-staging
          rsync -avz --delete --exclude '.git' --exclude 'node_modules' --exclude 'backend/node_modules' ./ /mnt/Storage2_New/website-hosting/linko-platform-staging/

      - name: Deploy Staging Services
        run: |
          docker rm -f linko-db-staging linko-backend-staging linko-frontend-staging || true
          cd /mnt/Storage2_New/website-hosting/linko-platform-staging
          docker compose up -d --build linko-db-staging linko-backend-staging linko-frontend-staging
