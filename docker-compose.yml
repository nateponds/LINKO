version: '3.8'

services:
  # =========================================================================
  # STAGING ENVIRONMENT (staging.linko.nateponds.com)
  # =========================================================================
  linko-db-staging:
    image: postgres:16
    container_name: linko-db-staging
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${STAGING_DB_PASSWORD:-postgres_staging_pass}
      POSTGRES_DB: linko_staging
    volumes:
      - /home/nateponds/linko-data/db-staging:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"

  linko-backend-staging:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: linko-backend-staging
    restart: always
    environment:
      DATABASE_URL: postgres://postgres:${STAGING_DB_PASSWORD:-postgres_staging_pass}@linko-db-staging:5432/linko_staging
      PORT: 5000
    ports:
      - "127.0.0.1:3003:5000"
    depends_on:
      - linko-db-staging

  linko-frontend-staging:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: linko-frontend-staging
    restart: always
    ports:
      - "127.0.0.1:8086:80"

  # =========================================================================
  # PRODUCTION ENVIRONMENT (linko.nateponds.com)
  # Production uses a managed Supabase Postgres. DATABASE_URL is injected from
  # the PROD_DATABASE_URL GitHub Actions secret (include ?sslmode=require).
  # No local prod Postgres container — Supabase is the source of truth.
  # =========================================================================
  linko-backend-production:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: linko-backend-production
    restart: always
    environment:
      DATABASE_URL: ${PROD_DATABASE_URL}
      PORT: 5000
    ports:
      - "127.0.0.1:3002:5000"

  linko-frontend-production:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: linko-frontend-production
    restart: always
    ports:
      - "127.0.0.1:8085:80"
